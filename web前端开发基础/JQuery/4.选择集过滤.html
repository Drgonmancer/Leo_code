<!--
1.选择集过滤的介绍
选择集过滤就是在选择标签的集合里面过滤自己需要的标签

2.选择集过滤的操作
2.1 has（选择器名称）方法，表示选取包含指定选择器的标签
2.2 eq（索引）方法，表示选取指定索引的标签
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <script src="js/jQuery-1.122.4.min.js"></script>

    <script>
        $(function(){
            // 通过jQuery选择器获取html的标签
            var $divs = $("div");
            // 获取包含有指定选择器的父标签
            $divs.has(".pname").css({"background":"red"});
            // 根据下标选择指定的标签
            $divs.eq(1).css({"background":"blue"})
        });
    </script>
</head>
<body>
    <div>
        <p class="pname">哈哈</p>
    </div>
    <div>
        <input type="button" value="按钮">
    </div>
</body>
</html>
