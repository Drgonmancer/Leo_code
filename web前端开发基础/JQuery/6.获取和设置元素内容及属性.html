<!--
1.HTML方法的使用
说明：给指定标签追加html内容使用append方法

2.prop方法的使用
之前使用css方法可以给标签设置样式属性，那么设置标签的其他属性可以使用prop方法了
说明L获取value属性和设置value属性还可以通过val方法来完成
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <script src="js/jQuery-1.12.4.min.js"></script>
    <script>
        $(function({
            // 获取标签
            var $div = $("div");
            // jQuery的方式获取标签内容
            alert($div.html());
            // 设置标签内容
            $div.html("<a href='https://www.baidu.com'>百度</a>");
            // 拓展：追加内容
            $div.append("<a href='https://www.baidu.com'>谷歌</a>");
            // 获取标签
            var $p = $("p");
            // 获取样式属性，比如：获取字体大小
            var $px = $p.css("font-size");
            alert($px);
            // 设置样式属性
            $p.css({"font-size":"30px","background":"green"});
            // 除了样式属性的相关操作使用css方法，其他属性的操作都是prop方法
            var $name = $text.prop("name");
            alert($name);

            var $type = $text.prop("type");
            alert($type);

            // 设置属性
            $text.prop({"value":"张三","class":"tname"});

            // 获取value属性可以使用val方法
            alert($text.prop("value"));
            // 使用val方法获取value属性
            alert($text.val())
            // 使用val方法设置value属性
            $text.val("王五")；
        });
    </script>
</head>
<body>
    <div>哈哈哈</div>
    <p>哈哈，我是一个段落标签</p>
    <input type="text" name="username" id="txt1" value="李四">
</body>
</html>
