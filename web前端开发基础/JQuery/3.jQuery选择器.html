<!--
1.jQuery选择器的介绍
jQuery选择器就是快速选择标签元素、获取标签的，选择规则和css样式一样

2.jQuery选择器的种类
1.标签选择器
2.类选择器
3.id选择器
4.层级选择器
5.属性选择器
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <script src="js/jQuery-1.12.4.min.js"></script>
    <script>
        $(function(){
            // 获取标签对象 - 元素选择器
            var $p = $("p");
            alert($p.length);
            // 通过jQuery设置标签的样式
            $p.css({"color":"red"});

            // .class选择器
            var $div = $(".div1");
            alert($div.length);

            // id选择器
            var $div1 = $("#box1");
            alert($div1.length);

            var h1 = $("div h1");
            alert(h1.length);

            // 属性选择器，先根据标签选择html标签，然后再根据属性值进行过滤标签
            var $input = $("input[type=text]");
            alert($input.length);
            // 结论：jQuery选择器获取标签，和css选择器匹配标签的方式一样
        });
    </script>
</head>
<body>
    <p>hello</p>
    <div class="div1">哈哈</div>
    <div id="box1">嘻嘻</div>
    <div>
        <h1>哈哈</h1>
    </div>
    <input type="text">
</body>
</html>
