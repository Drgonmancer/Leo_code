<!--
1.选择集转移介绍
选择集转移就是以选择的标签为参照，然后获取转移后的标签

2.选择集转移操作
$("#box").prev():表示选择id是box元素的上一个的同级元素
$("#box").prevAll():表示选择id是剥削元素的上面所有的同级元素
$("#box").next():表示选择id是box元素的下一个的同级元素
$("#box").nextAll():表示选择id是box元素的下面所有的同级元素
$("#box").parent():表示选择id是box元素的父元素
$("#box").children():表示选择id是box元素的所有子元素
$("#box").siblings():表示选择id是box元素的其它同级元素
$("#box").find('.myClass'):表示选择id是box元素的class等于myClass的元素
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <script src="js/jQuery-1.12.4.min.js"></script>

    <!-- 选择集转移：根据指定标签为参照物，选中其他标签，这种操作叫做选择集转移-->
    <script>
        $(function(){
            // 获取div，并把div作为参照物，获取其它标签
            var $div = $("box1")
            // css 参数是一个js对象，js对象和python里面字典很类似
            // 属性名和css里面的属性名保存一致
            $div.prev().css({"color":"red","font-size":"25px"});
            // 选择上面所有的同级标签
            $div.prevAll().css({"text-indent":"50px"});
            // 选择下一级同级标签
            $div.next.css({"color":"green"});
            // 选择下面所有的同级标签
            $div.nextAll().css({"text-indent":"50px"});
            // 选择同级的其它标签
            $div.siblings().css({"text-decoration":"underline"});
            // 选择父标签
            $div.parent().css({"background":"gray"});
            // 获取所有的子标签
            $div.children().css({"color":"red"});
            // 查找指定的子标签
            $div.find(".sp1").css({"color":"green"});
            
        })
    </script>
</head>
<body>
    <div>
        <h3>三级标题</h3>
        <p>哈哈哈</p>
        <div id="box1"><span>我是</span>一个<span class="sp1">div</span>标签</div>
        <h3>三级标题</h3>
        <p>哈哈哈</p>
    </div>
    <h3>三级标题</h3>
    <p>哈哈哈</p>
    <div id="box2">我是一个div标签</div>
    <h3>三级标题</h3>
    <p>哈哈哈</p>
</body>
</html>
