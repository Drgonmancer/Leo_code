<!--
1.JavaScript的定义
JavaScript是运行在浏览器端的脚步语言，是由浏览器解释执行的，简称js，它能够让王爷和用户有交互功能，
增加良好的用户体验效果

前端开发三大模块：1.HTML：负责网页结构 2.CSS：负责网页样式 3.JavaScript：负责网页行为
例：网页与用户的交互效果

2.JavaScript使用方式
2.1行内式（主要用于事件）
2.2内嵌式
2.3外链式

-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <!-- 内嵌式 -->
    <script>
      alert("我是内嵌式的js代码")
    </script>
    <!-- 外链式-->
    <script src="js/main.js"></script>
</head>
<body>
    <!--行内式-->
    <input type="button" value="按钮" onclick="alert('你点我了！')">
</body>
</html>
