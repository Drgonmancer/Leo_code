<!--
1.循环语句的介绍
JavaScript中常用的循环语句：
for
while
do-while
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
  <script>
    var aArray = [1,3,9];

    // for循环遍历数组
    for(var index = 0; index < aArray.length;index++){
        // 根据下标获取数据
        var oValue = aArray[index];
        alert(oValue);
    }

    // 开始取值的下标
    var index = 0
    while(index < aArray.length){
        // 根据下标获取数据
        var oValue = aArray[index];
        alert(oValue);
        index++;
    }

    var index = 0;
    do {
        // 这里需要完成取值操作，不管条件是否成立，do至少执行1次
        // alert('测试');
        var oValue = aArray[index];
        alert(oValue);
        index++;
    } while(index < aArray.length)
  </script>
</head>
<body>

</body>
</html>
