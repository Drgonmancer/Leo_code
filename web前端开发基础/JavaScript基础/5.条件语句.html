<!--
1.条件语句的介绍
条件语句就是通过条件来控制程序的走向

2.条件语句语法
2.1 if语句 - 只有当指定条件为true，使用该语句来执行代码
2.2 if...else语句 - 当条件为true时执行代码，当条件为false时执行其他代码
2.3 if...else if...else语句 - 使用该语句来判断多条件，执行条件成立的语句

3.比较运算符
== 等于
=== 全等（值和类型）
!= 不等于
> 大于
< 小于
>= 大于或等于
<= 小于或等于

4.逻辑运算符
&& and
|| or
! not
-->
