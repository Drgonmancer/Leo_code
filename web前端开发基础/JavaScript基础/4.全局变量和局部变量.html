<!--
1.变量作用域的介绍
变量作用域就是变量的使用范围，变量分为：
局部变量
全局变量

2.局部变量
局部变量就是在函数内使用的变量，只能在函数内部使用

3.全局变量
全局变量就是在函数外定义的变量，可以在不同函数内使用
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <script>
        //局部变量
        function fnShow(){
            var iNum = 1;
            alert(iNum)
        }
        // 调用函数
        fnShow()
        // 局部变量不能在函数外使用
        alert(iNum);

        //全局变量
        var iNum = 1;
        function fnModify(){
            alert(iNum1);
            iNum1 = 3;
            // ++ 等价于 += 1
            iNum1++
            alert(iNum1);
        }

        fnModify()
        //js可以数字类型和字符串直接进行相加，把数字自动转成字符串
        alert("函数外访问的全局变量：" + iNum1);
    </script>
</head>
<body>

</body>
</html>
