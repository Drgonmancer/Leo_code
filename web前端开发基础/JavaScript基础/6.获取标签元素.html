<!--
1.获取标签元素
可以使用内置对象document上的getElementByld方法来获取页面上设置了id属性的标签元素，
获取到的是一个html对象，然后将它赋值给一个变量
说明：
如果把JavaScript写在元素的上面就会出错，因为页面上从上往下加载执行的，
JavaScript去页面上获取元素div1的时候，元素div1还没有加载

2.操作标签元素属性
2.1 属性的操作
首先获取的页面标签元素，然后就可以对页面标签元素的属性进行操作，属性的操作包括：
  属性的读取
  属性的设置
属性名在js中的写法
1.html的属性和js里面属性大多数写法一样，但是"class"属性写成"className
2."style"属性里面的属性，有横杠的改成驼峰式，例："font-size"，改成"style.fontSize"
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        .btnstyle{
            background: yellow;
        }
    </style>
    <script>
        window.onload = function(){
            // 根据id获取标签对象
            var oBtn = document.getElementById("btn1");
            // 获取标签的属性
            alert(oBtn.type);
            alert(oBtn.value);
            // 设置标签的属性
            oBtn.name = "username";
            // 设置样式的属性
            // oBtn.style.background="red";
            // 相当于设置class，以后通过类选择器给标签添加样式
            oBtn.className = "btnstyle"
            oBtn.style.fontSize = "30px";
        };
    </script>
    <script>
<!--页面标签和数据都加载完成以后会触发onload事件-->
      window.onload = function(){
        var oP = document.getElementById("p1");
        alert(oP);
      };
    </script>
</head>
<body>
    <input type="button" value="按钮" id="btn1" class="btnstyle">
    <p id="p1">哈哈，我是一个段落标签</p>
</body>
</html>
<!--这种写法，不推荐，知道即可，就是等标签初始化完成再获取-->
<script>
    // js的内置对象，html的文档对象
    // 如果获取的对象是null，表示标签没有获取成功
    var oP = document.getElementById("p1");
    alert(oP);
</script>
